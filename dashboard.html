<!DOCTYPE html>
<html>
<head>
<title>Remote Shell</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Courier New', monospace; background: #0c0c0c; color: #ccc; height: 100vh; display: flex; flex-direction: column; }
#topbar { background: #1a1a1a; padding: 8px 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #333; flex-wrap: wrap; }
#topbar select { background: #2d2d2d; color: #fff; border: 1px solid #555; padding: 5px 10px; border-radius: 3px; }
#topbar .status { font-size: 12px; }
.online { color: #00ff88; }
.offline { color: #ff4444; }
#terminal { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; line-height: 1.4; }
#terminal .prompt { color: #00d4ff; }
#terminal .output { color: #ccc; white-space: pre-wrap; word-break: break-all; }
#terminal .error { color: #ff6b6b; white-space: pre-wrap; word-break: break-all; }
#terminal .info { color: #888; }
#terminal .success { color: #00ff88; }
#terminal .debug { color: #666; font-style: italic; }
#inputLine { display: flex; padding: 8px 15px; background: #1a1a1a; border-top: 1px solid #333; align-items: center; }
#inputLine span { color: #00d4ff; margin-right: 8px; white-space: nowrap; }
#cmdInput { flex: 1; background: transparent; border: none; color: #fff; font-family: 'Courier New', monospace; font-size: 13px; outline: none; padding: 5px 0; }
#sendBtn { background: #00d4ff; color: #000; border: none; padding: 6px 16px; border-radius: 3px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 13px; font-weight: bold; margin-left: 10px; }
#sendBtn:hover { background: #00b8d4; }
#sendBtn:active { background: #0099aa; }
.pc-list { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; }
.pc-badge { font-size: 11px; padding: 3px 8px; border-radius: 3px; display: flex; align-items: center; gap: 5px; }
.pc-badge.on { background: #003d25; color: #00ff88; }
.pc-badge.off { background: #3d0000; color: #ff4444; }
.pc-badge button { background: #ff4444; color: white; border: none; border-radius: 2px; cursor: pointer; font-size: 10px; padding: 1px 4px; }
a { color: #00d4ff; text-decoration: none; }
</style>
</head>
<body>
<div id="topbar">
    <strong style="color:#00d4ff;">REMOTE SHELL</strong>
    <select id="target"><option value="all">ALLE PCs</option></select>
    <span class="status" id="status"></span>
    <div class="pc-list" id="pcBadges"></div>
    <a href="/admin/logout" style="margin-left:auto;">Logout</a>
</div>
<div id="terminal"></div>
<div id="inputLine">
    <span id="promptText">PS &gt;</span>
    <input type="text" id="cmdInput" autocomplete="off" spellcheck="false" placeholder="Befehl eingeben...">
    <button id="sendBtn">SENDEN</button>
</div>

<script>
// ========== DEBUG HELPER ==========
function debug(msg) {
    console.log('[DEBUG]', msg);
    var term = document.getElementById('terminal');
    var d = document.createElement('div');
    d.className = 'debug';
    d.textContent = '[DEBUG] ' + msg;
    term.appendChild(d);
    term.scrollTop = term.scrollHeight;
}

// ========== ELEMENTE LADEN ==========
console.log('[INIT] Script start...');

var term = document.getElementById('terminal');
var input = document.getElementById('cmdInput');
var sendBtn = document.getElementById('sendBtn');
var target = document.getElementById('target');
var promptText = document.getElementById('promptText');
var status = document.getElementById('status');
var pcBadges = document.getElementById('pcBadges');

if (!term || !input || !sendBtn || !target) {
    console.error('[FATAL] Elements not found!');
    alert('Fehler: DOM Elemente nicht gefunden!');
} else {
    console.log('[INIT] Alle Elemente geladen ✓');
}

var history = [];
var hIdx = -1;
var adminWs = null;

// ========== TERMINAL OUTPUT ==========
function add(type, text) {
    var d = document.createElement('div');
    d.className = type;
    d.textContent = text;
    term.appendChild(d);
    term.scrollTop = term.scrollHeight;
}

// ========== INPUT FOKUS ==========
input.focus();
document.addEventListener('click', function(e) {
    if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'A' && e.target.tagName !== 'SELECT') {
        input.focus();
    }
});

// ========== WEBSOCKET ==========
function connectAdminWS() {
    debug('WebSocket verbinden...');
    
    if (adminWs && adminWs.readyState === WebSocket.OPEN) {
        debug('WebSocket bereits verbunden');
        return;
    }
    
    var protocol = (window.location.protocol === 'https:') ? 'wss:' : 'ws:';
    var wsUrl = protocol + '//' + window.location.host + '/ws?type=admin';
    debug('WebSocket URL: ' + wsUrl);
    
    try {
        adminWs = new WebSocket(wsUrl);
    } catch(e) {
        debug('WebSocket Fehler: ' + e.message);
        return;
    }
    
    adminWs.onopen = function() {
        debug('WebSocket verbunden ✓');
        add('info', '[SYSTEM] WebSocket verbunden');
    };
    
    adminWs.onmessage = function(event) {
        try {
            var msg = JSON.parse(event.data);
            if (msg.type === 'client-output') {
                add('output', '[' + msg.pcId + ' OUTPUT]:');
                var outputClass = (msg.output.trim().indexOf('Exit Code') === 0) ? 'error' : 'output';
                add(outputClass, msg.output.trim());
            } else if (msg.type === 'pc-status') {
                loadPCs();
            }
        } catch(e) {
            debug('Message parse error: ' + e.message);
        }
    };
    
    adminWs.onclose = function() {
        debug('WebSocket getrennt, reconnect in 5s...');
        add('info', '[SYSTEM] WebSocket getrennt, reconnect in 5s...');
        setTimeout(connectAdminWS, 5000);
    };
    
    adminWs.onerror = function(err) {
        debug('WebSocket Error');
        console.error('[WS FEHLER]', err);
    };
}

// ========== PC LISTE LADEN ==========
function loadPCs() {
    debug('PC Liste laden...');
    
    fetch('/pcs')
        .then(function(r) { 
            debug('PC Response Status: ' + r.status);
            return r.json(); 
        })
        .then(function(pcs) {
            debug('PCs empfangen: ' + pcs.length);
            var cur = target.value;
            target.innerHTML = '<option value="all">ALLE PCs</option>';
            pcBadges.innerHTML = '';
            
            pcs.forEach(function(p) {
                var o = document.createElement('option');
                o.value = p.id;
                o.textContent = p.id;
                target.appendChild(o);
                
                var badge = document.createElement('div');
                badge.className = 'pc-badge ' + (p.online ? 'on' : 'off');
                badge.innerHTML = p.id + ' ' + (p.online ? 'ON' : 'OFF') +
                    '<button onclick="removePC(\'' + p.id + '\')" title="Entfernen">X</button>';
                pcBadges.appendChild(badge);
            });
            
            try {
                var opt = pcs.find(function(p) { return p.id === cur; });
                target.value = opt ? opt.id : 'all';
            } catch(e) {}
            
            var n = pcs.filter(function(p) { return p.online; }).length;
            status.textContent = n + ' online';
            status.className = n > 0 ? 'status online' : 'status offline';
            
            if (target.value === 'all') {
                promptText.textContent = 'PS (ALL) >';
            } else {
                promptText.textContent = 'PS ' + target.value + ' >';
            }
        })
        .catch(function(err) {
            debug('PC Load Error: ' + err.message);
            console.error('Failed to load PCs:', err);
        });
}

// ========== PC ENTFERNEN ==========
function removePC(id) {
    if (!confirm('PC ' + id + ' wirklich entfernen?')) return;
    debug('Entferne PC: ' + id);
    
    fetch('/remove-pc', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pcId: id })
    }).then(function() {
        loadPCs();
        add('info', '[SYSTEM] PC ' + id + ' entfernt');
    }).catch(function(err) {
        debug('Remove PC Error: ' + err.message);
        console.error('Failed to remove PC:', err);
    });
}

// ========== COMMAND SENDEN (HAUPTFUNKTION) ==========
function sendCommand() {
    var cmd = input.value.trim();
    
    debug('sendCommand() aufgerufen');
    debug('Input value: "' + cmd + '"');
    
    if (!cmd) {
        debug('Input leer, abgebrochen');
        return;
    }
    
    // WICHTIG: Werte SPEICHERN bevor loadPCs() interferieren kann
    debug('Step 1: speichern Werte');
    var t = target.value;  // SOFORT speichern!
    var prompt = promptText.textContent;
    
    debug('Target: ' + t);
    debug('Step 2: history push');
    history.push(cmd);
    hIdx = history.length;
    
    debug('Step 3: add prompt');
    add('prompt', prompt + ' ' + cmd);
    
    debug('Step 4: clear input');
    input.value = '';
    input.focus();
    
    debug('Step 5: fetch command');
    
    fetch('/command', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ target: t, command: cmd })
    })
    .then(function(response) {
        debug('Server Response: ' + response.status);
        if (!response.ok) {
            throw new Error('HTTP ' + response.status);
        }
        return response.json();
    })
    .then(function(data) {
        debug('Response Data: ' + JSON.stringify(data));
        if (data.status) {
            add('success', '[ERFOLG] ' + data.status);
        } else if (data.error) {
            add('error', '[FEHLER] ' + data.error);
        } else {
            add('info', '[RESPONSE] ' + JSON.stringify(data));
        }
    })
    .catch(function(err) {
        debug('Command Error: ' + err.message);
        console.error('Failed to send command:', err);
        add('error', '[FEHLER] ' + err.message);
    });
}

// ========== ENTER TASTE ==========
input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        debug('Enter Taste gedrueckt');
        e.preventDefault();
        sendCommand();
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (hIdx > 0) {
            hIdx--;
            input.value = history[hIdx];
        }
    } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (hIdx < history.length - 1) {
            hIdx++;
            input.value = history[hIdx];
        } else {
            hIdx = history.length;
            input.value = '';
        }
    } else if (e.key === 'Tab') {
        e.preventDefault();
        var opts = Array.from(target.options);
        var idx = target.selectedIndex;
        target.selectedIndex = (idx + 1) % opts.length;
        
        if (target.value === 'all') {
            promptText.textContent = 'PS (ALL) >';
        } else {
            promptText.textContent = 'PS ' + target.value + ' >';
        }
    }
});

debug('Enter Event Listener registriert ✓');

// ========== BUTTON KLICK ==========
sendBtn.addEventListener('click', function(e) {
    debug('SENDEN Button geklickt');
    e.preventDefault();
    sendCommand();
    input.focus();
});

debug('Button Event Listener registriert ✓');

// ========== INITIALISIERUNG ==========
debug('Initialisiere...');
loadPCs();
setInterval(loadPCs, 10000);
connectAdminWS();

debug('Initialisierung abgeschlossen ✓');
add('info', '[SYSTEM] Dashboard bereit');
</script>

</body>
</html>
